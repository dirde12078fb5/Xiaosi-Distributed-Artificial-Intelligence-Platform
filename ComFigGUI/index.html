<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConfigGUI · 节点式配置</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 顶部工具栏 -->
  <header class="topbar">
    <div class="brand">
      <span class="logo-dot"></span>
      <span class="brand-name">ConfigGUI</span>
      <span class="brand-sub">· 节点式配置</span>
    </div>
    <div class="top-actions">
      <button id="btn-new" class="btn btn-ghost" title="新建工作流">新建</button>
      <button id="btn-save" class="btn btn-ghost" title="保存工作流到服务端">保存</button>
      <button id="btn-load" class="btn btn-ghost" title="从服务端加载已保存工作流">加载</button>
      <button id="btn-export" class="btn btn-ghost" title="导出 JSON 到本地">导出</button>
      <button id="btn-import" class="btn btn-ghost" title="从本地 JSON 导入">导入</button>
      <input type="file" id="file-input" accept="application/json" hidden />
      <button id="btn-run-server" class="btn btn-ghost" title="通过服务端 /api/run 执行">远端运行</button>
      <button id="btn-run" class="btn btn-primary" title="本地模拟运行工作流">运行</button>
    </div>
  </header>

  <div class="layout">
    <!-- 左侧节点库 -->
    <aside class="sidebar sidebar-left">
      <div class="panel-title">节点库</div>
      <input id="search-node" class="search-input" type="text" placeholder="搜索节点..." />
      <div id="node-library" class="node-library"></div>
    </aside>

    <!-- 中央画布 -->
    <main class="canvas-wrap">
      <div id="canvas" class="canvas">
        <svg id="wires" class="wires" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#7aa2f7" />
            </marker>
          </defs>
        </svg>
        <div id="nodes-layer" class="nodes-layer"></div>
        <div id="empty-hint" class="empty-hint">从左侧节点库拖拽节点到画布，或点击节点将其添加到工作流</div>
      </div>
      <div class="canvas-toolbar">
        <span class="status-text" id="status-text">就绪 · 0 节点 · 0 连线</span>
        <div class="zoom-controls">
          <button id="btn-zoom-out" class="btn-icon" title="缩小">−</button>
          <span id="zoom-label" class="zoom-label">100%</span>
          <button id="btn-zoom-in" class="btn-icon" title="放大">+</button>
          <button id="btn-reset-view" class="btn-icon" title="重置视图">⟳</button>
        </div>
      </div>
    </main>

    <!-- 右侧属性面板 -->
    <aside class="sidebar sidebar-right">
      <div class="panel-title">属性</div>
      <div id="property-panel" class="property-panel">
        <div class="property-empty">请选择一个节点以查看并编辑其属性</div>
      </div>
    </aside>
  </div>

  <script src="nodes.js"></script>
  <script src="app.js"></script>
</body>
</html>
