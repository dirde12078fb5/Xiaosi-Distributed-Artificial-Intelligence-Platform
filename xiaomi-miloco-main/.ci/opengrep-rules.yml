# Miloco OpenGrep 启动规则集（起步版，按需扩充）。
# 团队后续往这里加项目特定规则即可。语法兼容 Semgrep/OpenGrep。
rules:
  - id: python-eval-exec
    languages: [python]
    severity: ERROR
    message: "避免 eval/exec 执行动态字符串，易导致代码注入。"
    patterns:
      - pattern-either:
          - pattern: eval(...)
          - pattern: exec(...)

  - id: python-subprocess-shell-true
    languages: [python]
    severity: ERROR
    message: "subprocess 使用 shell=True 有命令注入风险，改用参数列表。"
    patterns:
      - pattern: subprocess.$F(..., shell=True, ...)

  - id: python-requests-verify-false
    languages: [python]
    severity: WARNING
    message: "requests 关闭 TLS 校验（verify=False）会使连接可被中间人攻击。"
    patterns:
      - pattern: requests.$M(..., verify=False, ...)

  - id: js-eval
    languages: [javascript, typescript]
    severity: ERROR
    message: "避免 eval()，易导致代码注入。"
    patterns:
      - pattern: eval(...)

  - id: js-child-process-exec-template
    languages: [javascript, typescript]
    severity: WARNING
    message: "child_process.exec 拼接外部输入有命令注入风险，优先用 execFile/spawn 传参数数组。"
    patterns:
      - pattern: $CP.exec(`...`)
