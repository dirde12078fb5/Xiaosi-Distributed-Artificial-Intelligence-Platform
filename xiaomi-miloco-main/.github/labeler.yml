# actions/labeler 配置：按 PR 变更文件路径映射到标签。
# size 标签由 labeler.yml workflow 的 size 作业按 diff 行数另外打。
backend:
  - changed-files:
      - any-glob-to-any-file: ["backend/**"]

cli:
  - changed-files:
      - any-glob-to-any-file: ["cli/**"]

plugin:
  - changed-files:
      - any-glob-to-any-file: ["plugins/openclaw/**"]

skills:
  - changed-files:
      - any-glob-to-any-file: ["plugins/skills/**"]

web:
  - changed-files:
      - any-glob-to-any-file: ["web/**"]

docs:
  - changed-files:
      - any-glob-to-any-file: ["knowledge/**", "**/*.md"]

ci:
  - changed-files:
      - any-glob-to-any-file: [".github/**", ".gitlab-ci.yml"]

scripts:
  - changed-files:
      - any-glob-to-any-file: ["scripts/**"]
