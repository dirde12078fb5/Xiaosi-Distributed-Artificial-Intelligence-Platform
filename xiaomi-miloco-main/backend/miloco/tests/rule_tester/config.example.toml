# Miloco rule tester config sample.
#
# Copy to `config.toml` and fill in. Environment variables
# (MILOCO_TESTER_LLM_*) override values here.

[llm]
# OpenAI-compatible endpoint (Anthropic / OpenAI / Azure / 自建网关皆可)
base_url = "https://api.openai.com/v1"
api_key = ""
model = "gpt-4o-mini"

[tester]
# Path to the miloco-cli binary (must be on PATH or absolute)
cli_bin = "miloco-cli"
# Max LLM round-trips per user query (safety cap; SOP usually finishes in 3-6)
max_iters = 8
