[tool.uv.workspace]
members = ["miot", "miloco"]

[tool.uv.sources]
miloco-miot = { workspace = true }

[tool.taskipy.tasks]
reset = "uv sync --all-groups --force-reinstall"
dev = "uv run miloco-backend"
test = "pytest -v"
check = "ty check ."
lint = "ruff check --fix .; ruff format ."

[dependency-groups]
dev = [
  "pytest>=9.0.3",
  "pytest-asyncio>=1.4.0",
  "pytest-dependency>=0.6.1",
  "ruff>=0.15.17",
  "taskipy2>=1.16.1",
  "ty>=0.0.49",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
norecursedirs = ["miot", "miloco/src/miloco/perception/engine/identity/tracker"]

[tool.ruff.lint]
select = [
  "E", # pycodestyle
  "F", # Pyflakes
  "I", # isort
]
ignore = [
  "E501", # Line too long
  "F403", # from xxx import *
]
