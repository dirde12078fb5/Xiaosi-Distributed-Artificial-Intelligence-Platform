server:
  port: 8083

spring:
  application:
    name: xiaosi-nas

  datasource:
    url: jdbc:h2:file:./data/nas;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Shanghai

nas:
  config-path: ../config/config.json
  storage-root: ./storage
  language: zh-CN

logging:
  level:
    com.xiaosi.nas: INFO
    org.springframework: WARN