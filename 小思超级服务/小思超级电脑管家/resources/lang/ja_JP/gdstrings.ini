IDS_NETWORK_NET_ERROR_-2 = 一般的な障害が発生しました
IDS_NETWORK_NET_ERROR_-3 = 操作が中止されました（ユーザー操作による）。
IDS_NETWORK_NET_ERROR_-7 = CONNECTION_TIMED_OUT、接続がタイムアウトしました
IDS_NETWORK_NET_ERROR_-15 = ソケット接続が切断されました
IDS_NETWORK_NET_ERROR_-21 = リクエスト中にネットワーク状態が変化しました。後でもう一度お試しください
IDS_NETWORK_NET_ERROR_-100 = 接続が閉じられました。ネットワーク接続を確認してページを再読み込みしてください
IDS_NETWORK_NET_ERROR_-101 = 接続が中断されました。ローカルセキュリティソフトウェアがをホワイトリストに追加したか、ネットワークファイアウォールホワイトリストに設定したかを確認するか、関連ツールを使用してIP接続をテストしてください
IDS_NETWORK_NET_ERROR_-102 = 接続が拒否されました。ローカルセキュリティソフトウェアがをホワイトリストに追加したか、ネットワークファイアウォールホワイトリストに設定したかを確認するか、関連ツールを使用してIP接続をテストしてください
IDS_NETWORK_NET_ERROR_-103 = 接続が中断されました。送信データのACKを受信しなかったためかもしれません。ネットワーク接続を確認してください
IDS_NETWORK_NET_ERROR_-104 = 接続試行に失敗しました。ネットワーク設定を確認してください
IDS_NETWORK_NET_ERROR_-105 = DNS解決に失敗しました。ローカルDNSサービスがドメインを正しく解決できるかを確認するか、対応するツールを使用してDNS解決を検出してください
IDS_NETWORK_NET_ERROR_-106 = ネットワーク切断が検出されました。現在ネットワークが接続されている場合、偶発的な問題の可能性があります。同じエラーコードが再び発生するかどうかを観察することをお勧めします
IDS_NETWORK_NET_ERROR_-107 = クライアントが受信したSSL証明書に欠陥があります。証明書情報が破損している可能性があります。ネットワーク環境が認証されているか、ネットワーク環境に第三者のハイジャックがないかを確認し、ITに連絡してさらに確認してください
IDS_NETWORK_NET_ERROR_-108 = IPアドレスまたはポート番号が無効です。ネットワーク設定を確認してください
IDS_NETWORK_NET_ERROR_-109 = IPアドレスに到達できません。ネットワーク接続を確認してください
IDS_NETWORK_NET_ERROR_-110 = サーバーがSSLクライアント認証証明書を要求しています。有効なクライアント証明書をお持ちであることを確認してください
IDS_NETWORK_NET_ERROR_-111 = プロキシサーバーへのトンネル接続を確立できません。プロキシサーバーの設定を確認してください
IDS_NETWORK_NET_ERROR_-112 = SSLプロトコルバージョンが有効になっていません。ブラウザの設定を確認してください
IDS_NETWORK_NET_ERROR_-113 = クライアントとサーバーが共通のSSLプロトコルバージョンまたは暗号スイートをサポートしていません。ブラウザを更新してみてください
IDS_NETWORK_NET_ERROR_-114 = サーバーが再交渉（再ハンドシェイク）を要求しています。ページを再読み込みしてみてください
IDS_NETWORK_NET_ERROR_-118 = 接続試行がタイムアウトしました。ネットワーク接続を確認してページを再読み込みしてください
IDS_NETWORK_NET_ERROR_-119 = 保留中のDNS解決が多すぎます。キュー内のリクエストが中止されました。後でもう一度お試しください
IDS_NETWORK_NET_ERROR_-120 = SOCKSプロキシサーバーへの接続を確立できません。プロキシサーバーの設定を確認してください
IDS_NETWORK_NET_ERROR_-122 = 代替プロトコルの交渉要求が失敗しました。ブラウザまたはオペレーティングシステムを更新してみてください
IDS_NETWORK_NET_ERROR_-123 = SSLピアが「再交渉なし」のアラートを送信しました。ブラウザを更新してみてください
IDS_NETWORK_NET_ERROR_-127 = トンネルの確立のためのプロキシリクエスト認証です。プロキシサーバーの設定と認証情報を確認してください
IDS_NETWORK_NET_ERROR_-130 = プロキシサーバーへの接続を作成できません。プロキシサーバーの設定とネットワーク接続を確認してください
IDS_NETWORK_NET_ERROR_-131 = 強制プロキシ設定を使用できません。プロキシサーバーの設定を確認してください
